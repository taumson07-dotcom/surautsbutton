<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* CONTAINER STICKY BAWAH KANAN */
.button-roller {
  position: fixed;
  right: 20px;
  bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 9999;

  animation: floatUpDown 7s ease-in-out infinite;
}

/* BUTTON DESIGN */
.roll-btn {
  background: linear-gradient(135deg, #0f9d58, #19d37a);
  color: white;
  padding: 12px 18px;
  border-radius: 35px;
  text-decoration: none;
  font-weight: bold;
  font-size: 14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);

  opacity: 0;
  transform: scale(0) rotate(-180deg);

  transition: all 0.3s ease;
  display: inline-block;

  animation:
    popRotate 0.7s forwards,
    heartbeat 2s infinite;
}

/* DELAY MASUK */
.roll-btn:nth-child(1){ animation-delay: 0.2s, 1s; }
.roll-btn:nth-child(2){ animation-delay: 0.4s, 1.2s; }
.roll-btn:nth-child(3){ animation-delay: 0.6s, 1.4s; }
.roll-btn:nth-child(4){ animation-delay: 0.8s, 1.6s; }
.roll-btn:nth-child(5){ animation-delay: 1s, 1.8s; }
.roll-btn:nth-child(6){ animation-delay: 1.2s, 2s; }

/* HOVER */
.roll-btn:hover {
  transform: scale(1.15);
  background: linear-gradient(135deg, #1de9b6, #00c853);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* GERAK NAIK TURUN */
@keyframes floatUpDown {
  0% { transform: translateY(0); }
  50% { transform: translateY(-80px); }
  100% { transform: translateY(0); }
}

/* ANIMASI MASUK */
@keyframes popRotate {
  to {
    transform: scale(1) rotate(0deg);
    opacity: 1;
  }
}

/* DEGUP */
@keyframes heartbeat {
  0%,100% { transform: scale(1); }
  25% { transform: scale(1.05); }
  50% { transform: scale(1.12); }
  75% { transform: scale(1.05); }
}

/* MOBILE OPTIMIZE */
@media (max-width: 768px) {
  .roll-btn {
    font-size: 12px;
    padding: 10px 14px;
  }
}

</style>
</head>

<body>

<div class="button-roller" id="roller">

  <a href="https://sites.google.com/view/surauarahmants/home" class="roll-btn">🏠 Utama</a>

  <a href="https://sites.google.com/view/surauarahmants/maqasid-syariah" class="roll-btn">📖 Maqasid Syariah</a>

  <a href="https://sites.google.com/view/surauarahmants/pembinaan-surau" class="roll-btn">🏗️ Pembinaan Surau</a>

  <a href="https://sites.google.com/view/surauarahmants/dana-wakaf" class="roll-btn">💰 Dana & Wakaf</a>

  <a href="https://sites.google.com/view/surauarahmants/inspirasi-islam" class="roll-btn">✨ Inspirasi Islam</a>

  <a href="https://sites.google.com/view/surauarahmants/faq" class="roll-btn">❓ FAQ</a>

</div>

<script>
const roller = document.getElementById("roller");

/* PAUSE HOVER */
roller.addEventListener("mouseenter", () => {
  roller.style.animationPlayState = "paused";
});
roller.addEventListener("mouseleave", () => {
  roller.style.animationPlayState = "running";
});

/* PAUSE TOUCH */
roller.addEventListener("touchstart", () => {
  roller.style.animationPlayState = "paused";
});
roller.addEventListener("touchend", () => {
  roller.style.animationPlayState = "running";
});
</script>

</body>
</html>
